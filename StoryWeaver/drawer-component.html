<!-- StoryWeaver Drawer Component - 参考 st-beat-tracker-main 设计风格 -->
<div id="storyweaver-wrapper" class="drawer">
  <!-- 顶部功能栏触发按钮 -->
  <div class="drawer-toggle" title="StoryWeaver - TXT转世界书工具">
    <div id="storyweaver-icon" class="drawer-icon fa-solid fa-book-open fa-fw interactable closedIcon" tabindex="0"></div>
  </div>

  <!-- 内容面板 -->
  <div id="storyweaver-content-panel" class="drawer-content closedDrawer">
    <!-- 面板头部 -->
    <div class="drawer-header">
      <h3><i class="fa-solid fa-book-open fa-fw"></i> StoryWeaver</h3>
      <span class="sw-version">v0.2.0</span>
    </div>

    <!-- 主内容区 -->
    <div class="sw-panels-wrapper">
      <!-- 简介卡片 -->
      <div class="sw-card">
        <div class="sw-card-header">
          <i class="fa-solid fa-circle-info fa-fw"></i>
          <span>功能简介</span>
        </div>
        <p class="sw-description">
          将 TXT 小说文件智能转换为 SillyTavern 世界书格式，支持多 API 并行处理、断点续传、条目合并等功能。
        </p>
      </div>

      <!-- 操作按钮区 -->
      <div class="sw-actions-card">
        <button id="storyweaver-open-converter" class="sw-primary-btn">
          <i class="fa-solid fa-wand-magic-sparkles fa-fw"></i>
          打开 TXT 转换器
        </button>
      </div>

      <!-- 功能特性列表 -->
      <div class="sw-features">
        <div class="sw-feature-item">
          <i class="fa-solid fa-bolt fa-fw"></i>
          <span>多 API 并行处理</span>
        </div>
        <div class="sw-feature-item">
          <i class="fa-solid fa-rotate-left fa-fw"></i>
          <span>断点续传与历史回滚</span>
        </div>
        <div class="sw-feature-item">
          <i class="fa-solid fa-object-group fa-fw"></i>
          <span>智能条目合并</span>
        </div>
        <div class="sw-feature-item">
          <i class="fa-solid fa-sliders fa-fw"></i>
          <span>自定义分类配置</span>
        </div>
      </div>
    </div>
  </div>
</div>
